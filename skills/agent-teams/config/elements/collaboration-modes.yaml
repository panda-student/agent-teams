collaboration_modes:
  one-way:
    id: one-way
    name: 单向协作
    description: 信息单向传递，无反馈
    flow_pattern:
      type: one-way
      connections:
        - from: sender
          to: receiver
          bidirectional: false
    constraints:
      max_parallel: 1
      timeout: 300
    use_cases:
      - 任务分配
      - 结果汇报
      - 通知传达

  two-way:
    id: two-way
    name: 双向协作
    description: 双向沟通，有反馈
    flow_pattern:
      type: two-way
      connections:
        - from: party_a
          to: party_b
          bidirectional: true
    constraints:
      max_parallel: 2
      timeout: 600
    use_cases:
      - 问题讨论
      - 方案确认
      - 需求澄清

  network:
    id: network
    name: 网络协作
    description: 多对多自由沟通
    flow_pattern:
      type: network
      connections:
        - from: all
          to: all
          bidirectional: true
    constraints:
      max_parallel: 5
      timeout: 900
    use_cases:
      - 复杂问题解决
      - 创意讨论
      - 跨团队协作

  hierarchical:
    id: hierarchical
    name: 层级协作
    description: 通过中心节点协调
    flow_pattern:
      type: hierarchical
      connections:
        - from: lead
          to: members
          bidirectional: true
        - from: members
          to: lead
          bidirectional: true
    constraints:
      max_parallel: 3
      timeout: 600
    use_cases:
      - 大型团队管理
      - 复杂项目协调
      - 资源分配

  pipeline:
    id: pipeline
    name: 流水线协作
    description: 顺序传递，各司其职
    flow_pattern:
      type: pipeline
      connections:
        - from: stage_1
          to: stage_2
          bidirectional: false
        - from: stage_2
          to: stage_3
          bidirectional: false
        - from: stage_3
          to: stage_4
          bidirectional: false
    constraints:
      max_parallel: 4
      timeout: 1200
    use_cases:
      - CI/CD流程
      - 标准化流程
      - 顺序处理任务
