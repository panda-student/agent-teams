workflow_types:
  serial:
    id: serial
    name: 串行流程
    description: 任务顺序执行
    stages:
      - id: stage_1
        name: 阶段1
        tasks: []
        execution: serial
        dependencies: []
      - id: stage_2
        name: 阶段2
        tasks: []
        execution: serial
        dependencies:
          - stage_1
      - id: stage_3
        name: 阶段3
        tasks: []
        execution: serial
        dependencies:
          - stage_2
    transitions: []
    use_cases:
      - 有依赖关系的任务
      - 顺序处理
      - 流水线作业

  parallel:
    id: parallel
    name: 并行流程
    description: 任务同时执行
    stages:
      - id: start
        name: 开始
        tasks: []
        execution: serial
        dependencies: []
      - id: parallel_tasks
        name: 并行任务
        tasks:
          - task_a
          - task_b
          - task_c
        execution: parallel
        dependencies:
          - start
      - id: end
        name: 结束
        tasks: []
        execution: serial
        dependencies:
          - parallel_tasks
    transitions: []
    use_cases:
      - 独立任务
      - 无依赖处理
      - 批量操作

  hybrid:
    id: hybrid
    name: 混合流程
    description: 串并行结合
    stages:
      - id: analysis
        name: 分析阶段
        tasks:
          - requirement_analysis
        execution: serial
        dependencies: []
      - id: development
        name: 开发阶段
        tasks:
          - frontend_dev
          - backend_dev
          - database_design
        execution: parallel
        dependencies:
          - analysis
      - id: integration
        name: 集成阶段
        tasks:
          - integration_test
        execution: serial
        dependencies:
          - development
    transitions: []
    use_cases:
      - 复杂项目
      - 部分依赖
      - 敏捷开发

  iterative:
    id: iterative
    name: 迭代流程
    description: 循环执行直到满足条件
    stages:
      - id: analyze
        name: 分析
        tasks:
          - problem_analysis
        execution: serial
        dependencies: []
      - id: execute
        name: 执行
        tasks:
          - implement_fix
        execution: serial
        dependencies:
          - analyze
      - id: verify
        name: 验证
        tasks:
          - verify_result
        execution: serial
        dependencies:
          - execute
    transitions:
      - from: verify
        to: analyze
        condition: "result_not_satisfied"
      - from: verify
        to: end
        condition: "result_satisfied"
    use_cases:
      - Bug修复
      - 需要反复调整的任务
      - 优化迭代

  conditional:
    id: conditional
    name: 条件流程
    description: 根据条件选择分支
    stages:
      - id: decision
        name: 决策点
        tasks:
          - evaluate_condition
        execution: serial
        dependencies: []
      - id: branch_a
        name: 分支A
        tasks:
          - branch_a_tasks
        execution: serial
        dependencies:
          - decision
        condition: "condition_a"
      - id: branch_b
        name: 分支B
        tasks:
          - branch_b_tasks
        execution: serial
        dependencies:
          - decision
        condition: "condition_b"
    transitions:
      - from: decision
        to: branch_a
        condition: "condition_a_met"
      - from: decision
        to: branch_b
        condition: "condition_b_met"
    use_cases:
      - 动态决策场景
      - 多分支处理
      - 异常处理
