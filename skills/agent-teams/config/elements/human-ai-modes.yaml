human_ai_modes:
  auto:
    id: auto
    name: 全自动模式
    description: AI 自主完成所有决策
    user_participation: 0
    decision_points: []
    escalation_rules:
      - condition: "遇到无法处理的错误"
        action: "上报用户"
      - condition: "资源不足"
        action: "请求用户确认"
    use_cases:
      - 低风险任务
      - 标准化流程
      - 自动化部署

  key-node:
    id: key-node
    name: 关键节点确认
    description: 用户确认关键决策点
    user_participation: 20
    decision_points:
      - id: planning_confirm
        name: 计划确认
        type: confirm
        required: true
        timeout: 300
        auto_action: "等待用户确认"
      - id: completion_review
        name: 完成审核
        type: review
        required: true
        timeout: 600
        auto_action: "等待用户审核"
    escalation_rules:
      - condition: "计划变更"
        action: "请求用户确认"
      - condition: "风险增加"
        action: "上报用户决策"
    use_cases:
      - 常规开发
      - 标准项目
      - 功能迭代

  interactive:
    id: interactive
    name: 交互式模式
    description: 用户频繁参与决策
    user_participation: 50
    decision_points:
      - id: requirement_clarify
        name: 需求澄清
        type: input
        required: true
        timeout: 300
        auto_action: "使用默认值"
      - id: solution_select
        name: 方案选择
        type: select
        required: true
        timeout: 600
        auto_action: "选择推荐方案"
      - id: progress_review
        name: 进度审核
        type: review
        required: true
        timeout: 600
        auto_action: "继续执行"
    escalation_rules:
      - condition: "多个方案可选"
        action: "请求用户选择"
      - condition: "需求不明确"
        action: "请求用户澄清"
    use_cases:
      - 复杂项目
      - 创新需求
      - Bug修复

  guided:
    id: guided
    name: 引导式模式
    description: AI 辅助，用户主导
    user_participation: 80
    decision_points:
      - id: task_input
        name: 任务输入
        type: input
        required: true
        timeout: 0
        auto_action: "无"
      - id: step_confirm
        name: 步骤确认
        type: confirm
        required: true
        timeout: 0
        auto_action: "无"
      - id: result_feedback
        name: 结果反馈
        type: review
        required: true
        timeout: 0
        auto_action: "无"
    escalation_rules:
      - condition: "每一步完成"
        action: "等待用户反馈"
      - condition: "遇到问题"
        action: "提供选项供用户选择"
    use_cases:
      - 探索性任务
      - 学习场景
      - 新领域开发

  manual:
    id: manual
    name: 手动模式
    description: 用户完全控制
    user_participation: 100
    decision_points:
      - id: all_decisions
        name: 所有决策
        type: input
        required: true
        timeout: 0
        auto_action: "无"
    escalation_rules:
      - condition: "任何决策点"
        action: "等待用户决策"
    use_cases:
      - 高风险操作
      - 关键决策
      - 生产环境变更
