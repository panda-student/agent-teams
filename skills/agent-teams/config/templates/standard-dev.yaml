template:
  id: standard-dev
  name: 标准开发流程
  description: 适用于常规功能开发的标准流程

team:
  type: dev
  members:
    - role: lead
      count: 1
    - role: frontend
      count: 1
    - role: backend
      count: 1

collaboration:
  mode: hierarchical
  rules:
    - condition: "任务分配"
      action: "lead分配给对应角色"
    - condition: "进度汇报"
      action: "成员汇报给lead"
    - condition: "问题上报"
      action: "成员上报给lead处理"

human_ai:
  mode: key-node
  decision_points:
    - stage: planning
      type: confirm
      required: true
      description: "确认开发计划"
    - stage: design_review
      type: review
      required: true
      description: "审核设计方案"
    - stage: completion
      type: review
      required: true
      description: "审核完成结果"

workflow:
  type: hybrid
  stages:
    - id: requirement
      name: 需求分析
      execution: serial
      tasks:
        - analyze_requirements
        - clarify_scope
        - identify_dependencies
      dependencies: []
      quality_gate:
        checks:
          - requirement_document_complete
        action: "用户确认需求文档"

    - id: design
      name: 设计阶段
      execution: parallel
      tasks:
        - api_design
        - database_design
        - ui_design
      dependencies:
        - requirement
      quality_gate:
        checks:
          - design_document_complete
          - design_review_passed
        action: "用户审核设计方案"

    - id: development
      name: 开发阶段
      execution: parallel
      tasks:
        - frontend_development
        - backend_development
      dependencies:
        - design
      quality_gate:
        checks:
          - compile_passed
          - typecheck_passed
          - lint_passed
        action: "自动质量检查"

    - id: integration
      name: 集成阶段
      execution: serial
      tasks:
        - integrate_components
        - integration_test
      dependencies:
        - development
      quality_gate:
        checks:
          - integration_test_passed
        action: "自动集成测试"

    - id: testing
      name: 测试阶段
      execution: parallel
      tasks:
        - unit_test
        - e2e_test
      dependencies:
        - integration
      quality_gate:
        checks:
          - test_coverage_met
          - all_tests_passed
        action: "自动测试验证"

    - id: delivery
      name: 交付阶段
      execution: serial
      tasks:
        - code_review
        - documentation
        - deployment
      dependencies:
        - testing
      quality_gate:
        checks:
          - final_review_passed
          - docs_complete
        action: "用户最终审核"

parallel_execution:
  max_parallelism: 3
  resource_conflict:
    file_exclusive: true
    module_exclusive: true
  quality_integration:
    - rule: "每个阶段完成后立即执行质量验证"
    - rule: "质量验证可并行执行"
    - rule: "质量门不通过则阻塞后续任务"

deliverables:
  - type: requirement
    path: deliverables/requirements/
    format: "[需求名称]-[日期].md"
  - type: design
    path: deliverables/designs/
    format: "[设计名称]-[日期].md"
  - type: plan
    path: deliverables/plans/
    format: "[计划名称]-[日期].md"
  - type: report
    path: deliverables/reports/
    format: "[报告名称]-[日期].md"

logging:
  execution_log: logs/executions/
  decision_log: logs/decisions/
  quality_log: logs/quality/
