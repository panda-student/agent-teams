template:
  id: auto-cicd
  name: 全自动CI/CD流程
  description: 适用于自动化构建、测试和部署的全自动流程

team:
  type: ops
  members:
    - role: lead
      count: 1
    - role: devops
      count: 2

collaboration:
  mode: pipeline
  rules:
    - condition: "阶段流转"
      action: "自动传递到下一阶段"
    - condition: "失败处理"
      action: "自动回滚并通知"
    - condition: "完成通知"
      action: "通知相关人员"

human_ai:
  mode: auto
  decision_points: []
  escalation_rules:
    - condition: "构建失败"
      action: "通知开发团队"
    - condition: "测试失败"
      action: "阻止部署并通知"
    - condition: "部署失败"
      action: "自动回滚并通知"

workflow:
  type: serial
  stages:
    - id: checkout
      name: 代码检出
      execution: serial
      tasks:
        - fetch_code
        - resolve_dependencies
      dependencies: []
      quality_gate:
        checks:
          - code_fetched
          - dependencies_resolved
        action: "自动验证"

    - id: lint
      name: 代码检查
      execution: parallel
      tasks:
        - style_check
        - format_check
        - static_analysis
      dependencies:
        - checkout
      quality_gate:
        checks:
          - lint_passed
        action: "自动检查"
      on_failure: "stop"

    - id: build
      name: 构建
      execution: serial
      tasks:
        - compile
        - bundle
        - generate_artifacts
      dependencies:
        - lint
      quality_gate:
        checks:
          - build_success
          - artifacts_generated
        action: "自动验证"
      on_failure: "stop"

    - id: test
      name: 测试
      execution: parallel
      tasks:
        - unit_test
        - integration_test
        - e2e_test
        - security_test
      dependencies:
        - build
      quality_gate:
        checks:
          - all_tests_passed
          - coverage_threshold_met
        action: "自动测试"
      on_failure: "stop"

    - id: package
      name: 打包
      execution: serial
      tasks:
        - create_container
        - push_registry
        - tag_version
      dependencies:
        - test
      quality_gate:
        checks:
          - container_created
          - image_pushed
        action: "自动验证"

    - id: deploy_staging
      name: 部署预发
      execution: serial
      tasks:
        - deploy_to_staging
        - run_smoke_test
        - verify_deployment
      dependencies:
        - package
      quality_gate:
        checks:
          - staging_deployed
          - smoke_test_passed
        action: "自动验证"
      on_failure: "rollback"

    - id: deploy_production
      name: 部署生产
      execution: serial
      tasks:
        - deploy_to_production
        - run_health_check
        - verify_deployment
      dependencies:
        - deploy_staging
      quality_gate:
        checks:
          - production_deployed
          - health_check_passed
        action: "自动验证"
      on_failure: "rollback"

    - id: notify
      name: 通知
      execution: serial
      tasks:
        - send_success_notification
        - update_status
      dependencies:
        - deploy_production

parallel_execution:
  max_parallelism: 4
  resource_conflict:
    file_exclusive: false
    module_exclusive: false
  quality_integration:
    - rule: "每个阶段自动执行质量检查"
    - rule: "失败立即停止并回滚"
    - rule: "全流程无需人工干预"

rollback:
  enabled: true
  triggers:
    - test_failure
    - deployment_failure
    - health_check_failure
  actions:
    - revert_to_previous_version
    - notify_team
    - log_failure

notifications:
  channels:
    - type: email
      events:
        - build_success
        - build_failure
        - deployment_success
        - deployment_failure
    - type: slack
      events:
        - deployment_success
        - deployment_failure
        - rollback_triggered

deliverables:
  - type: report
    path: deliverables/reports/
    format: "cicd-report-[版本号]-[日期].md"

logging:
  execution_log: logs/executions/
  decision_log: logs/decisions/
  quality_log: logs/quality/
