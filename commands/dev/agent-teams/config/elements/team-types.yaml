team_types:
  product:
    id: product
    name: 产品团队
    roles:
      - id: lead
        name: 产品负责人
        skills:
          - 产品规划
          - 需求分析
          - 用户研究
        responsibilities:
          - 产品方向决策
          - 需求优先级排序
          - 资源协调
      - id: analyst
        name: 需求分析师
        skills:
          - 需求分析
          - 文档编写
          - 沟通协调
        responsibilities:
          - 需求调研
          - 需求文档编写
          - 需求评审
      - id: researcher
        name: 用户研究员
        skills:
          - 用户访谈
          - 数据分析
          - 竞品分析
        responsibilities:
          - 用户调研
          - 数据分析
          - 竞品研究
    min_members: 2
    max_members: 5
    lead_role: lead

  dev:
    id: dev
    name: 开发团队
    roles:
      - id: lead
        name: 技术负责人
        skills:
          - 架构设计
          - 代码审查
          - 任务协调
        responsibilities:
          - 技术决策
          - 任务分配
          - 进度跟踪
      - id: frontend
        name: 前端开发
        skills:
          - React
          - TypeScript
          - CSS
        responsibilities:
          - UI实现
          - 前端逻辑
          - 组件开发
      - id: backend
        name: 后端开发
        skills:
          - Node.js
          - Database
          - API设计
        responsibilities:
          - API实现
          - 数据处理
          - 业务逻辑
      - id: architect
        name: 架构师
        skills:
          - 系统设计
          - 技术选型
          - 性能优化
        responsibilities:
          - 架构设计
          - 技术选型
          - 技术评审
    min_members: 3
    max_members: 6
    lead_role: lead

  test:
    id: test
    name: 测试团队
    roles:
      - id: lead
        name: 测试负责人
        skills:
          - 测试策略
          - 自动化测试
          - 质量管理
        responsibilities:
          - 测试计划
          - 资源协调
          - 报告审核
      - id: qa
        name: QA工程师
        skills:
          - 功能测试
          - 性能测试
          - 安全测试
        responsibilities:
          - 测试执行
          - Bug报告
          - 回归验证
    min_members: 2
    max_members: 4
    lead_role: lead

  review:
    id: review
    name: 评审团队
    roles:
      - id: lead
        name: 评审负责人
        skills:
          - 代码审查
          - 质量标准
          - 流程管理
        responsibilities:
          - 评审组织
          - 标准制定
          - 结果汇总
      - id: reviewer
        name: 代码评审员
        skills:
          - 代码审查
          - 最佳实践
          - 安全审计
        responsibilities:
          - 代码评审
          - 问题识别
          - 改进建议
      - id: auditor
        name: 安全审计员
        skills:
          - 安全审计
          - 漏洞检测
          - 合规检查
        responsibilities:
          - 安全审计
          - 漏洞分析
          - 合规评估
    min_members: 2
    max_members: 4
    lead_role: lead

  ops:
    id: ops
    name: 运维团队
    roles:
      - id: lead
        name: 运维负责人
        skills:
          - 系统运维
          - 容量规划
          - 应急响应
        responsibilities:
          - 运维规划
          - 资源管理
          - 故障处理
      - id: devops
        name: DevOps工程师
        skills:
          - CI/CD
          - 容器化
          - 自动化
        responsibilities:
          - 流水线维护
          - 部署自动化
          - 环境管理
      - id: sre
        name: SRE工程师
        skills:
          - 可靠性工程
          - 监控告警
          - 性能优化
        responsibilities:
          - 系统可靠性
          - 监控建设
          - 容量管理
    min_members: 2
    max_members: 5
    lead_role: lead

  design:
    id: design
    name: 设计团队
    roles:
      - id: lead
        name: 设计负责人
        skills:
          - 设计管理
          - 设计规范
          - 创意指导
        responsibilities:
          - 设计方向
          - 规范制定
          - 质量把控
      - id: ui
        name: UI设计师
        skills:
          - UI设计
          - 设计工具
          - 设计系统
        responsibilities:
          - 界面设计
          - 组件设计
          - 视觉规范
      - id: ux
        name: UX设计师
        skills:
          - 交互设计
          - 用户研究
          - 原型设计
        responsibilities:
          - 交互设计
          - 用户体验
          - 原型制作
    min_members: 2
    max_members: 4
    lead_role: lead

  mixed:
    id: mixed
    name: 混合团队
    description: 根据任务动态组合的跨职能团队
    roles:
      - id: lead
        name: 团队负责人
        skills:
          - 项目管理
          - 跨职能协调
          - 问题解决
        responsibilities:
          - 团队协调
          - 任务分配
          - 进度跟踪
      - id: dev
        name: 开发人员
        skills:
          - 编码
          - 调试
          - 问题修复
        responsibilities:
          - 代码实现
          - Bug修复
          - 技术支持
      - id: qa
        name: 测试人员
        skills:
          - 测试
          - 验证
          - 质量保证
        responsibilities:
          - 测试执行
          - 结果验证
          - 质量报告
    min_members: 3
    max_members: 8
    lead_role: lead
