template:
  id: bug-fix
  name: Bug修复流程
  description: 适用于Bug定位和修复的迭代流程

team:
  type: mixed
  members:
    - role: lead
      count: 1
    - role: dev
      count: 2
    - role: qa
      count: 1

collaboration:
  mode: network
  rules:
    - condition: "问题讨论"
      action: "所有成员自由沟通"
    - condition: "假设验证"
      action: "并行验证多个假设"
    - condition: "修复确认"
      action: "lead汇总确认"

human_ai:
  mode: interactive
  decision_points:
    - stage: root_cause
      type: select
      required: true
      description: "选择根因分析结果"
    - stage: fix_plan
      type: confirm
      required: true
      description: "确认修复方案"
    - stage: verification
      type: review
      required: true
      description: "验证修复结果"

workflow:
  type: iterative
  stages:
    - id: reproduce
      name: 问题复现
      execution: serial
      tasks:
        - understand_issue
        - reproduce_bug
        - document_symptoms
      dependencies: []
      quality_gate:
        checks:
          - bug_reproduced
        action: "确认问题可复现"

    - id: analyze
      name: 根因分析
      execution: parallel
      tasks:
        - analyze_logs
        - analyze_code
        - analyze_data
        - check_dependencies
      dependencies:
        - reproduce
      quality_gate:
        checks:
          - root_cause_identified
        action: "用户确认根因"

    - id: hypothesize
      name: 假设验证
      execution: parallel
      tasks:
        - hypothesis_1_test
        - hypothesis_2_test
        - hypothesis_3_test
      dependencies:
        - analyze
      quality_gate:
        checks:
          - hypothesis_verified
        action: "确认假设验证结果"

    - id: fix
      name: 修复实施
      execution: serial
      tasks:
        - implement_fix
        - local_test
        - code_review
      dependencies:
        - hypothesize
      quality_gate:
        checks:
          - compile_passed
          - typecheck_passed
          - local_test_passed
        action: "自动质量检查"

    - id: verify
      name: 验证测试
      execution: serial
      tasks:
        - regression_test
        - integration_test
        - edge_case_test
      dependencies:
        - fix
      quality_gate:
        checks:
          - bug_fixed
          - no_new_bugs
          - regression_passed
        action: "用户验证修复"

    - id: iterate
      name: 迭代判断
      execution: serial
      tasks:
        - evaluate_result
      dependencies:
        - verify
      transitions:
        - condition: "bug_not_fixed"
          to: analyze
        - condition: "bug_fixed"
          to: complete

    - id: complete
      name: 完成阶段
      execution: serial
      tasks:
        - update_documentation
        - close_issue
        - post_mortem
      dependencies:
        - iterate

parallel_execution:
  max_parallelism: 4
  resource_conflict:
    file_exclusive: true
    module_exclusive: true
  quality_integration:
    - rule: "每次修复后立即验证"
    - rule: "验证失败则重新分析"
    - rule: "支持快速迭代"

deliverables:
  - type: report
    path: deliverables/reports/
    format: "bug-fix-[BugID]-[日期].md"
  - type: review
    path: deliverables/reviews/
    format: "post-mortem-[BugID]-[日期].md"

logging:
  execution_log: logs/executions/
  decision_log: logs/decisions/
  quality_log: logs/quality/
