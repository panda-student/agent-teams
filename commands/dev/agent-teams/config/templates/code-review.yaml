template:
  id: code-review
  name: 代码评审流程
  description: 适用于代码质量检查和安全审计的评审流程

team:
  type: review
  members:
    - role: lead
      count: 1
    - role: reviewer
      count: 2

collaboration:
  mode: parallel
  rules:
    - condition: "评审执行"
      action: "多个评审员并行评审"
    - condition: "结果汇总"
      action: "lead汇总评审结果"
    - condition: "问题讨论"
      action: "评审员讨论确认"

human_ai:
  mode: key-node
  decision_points:
    - stage: review_complete
      type: select
      required: true
      description: "选择评审结果：通过/需修改/不通过"
    - stage: issue_resolution
      type: confirm
      required: true
      description: "确认问题处理方案"

workflow:
  type: conditional
  stages:
    - id: prepare
      name: 评审准备
      execution: serial
      tasks:
        - collect_artifacts
        - identify_scope
        - prepare_checklist
      dependencies: []
      quality_gate:
        checks:
          - artifacts_collected
          - scope_defined
        action: "确认评审范围"

    - id: review
      name: 评审执行
      execution: parallel
      tasks:
        - code_quality_review
        - security_review
        - performance_review
        - best_practice_review
      dependencies:
        - prepare
      quality_gate:
        checks:
          - all_reviews_completed
        action: "汇总评审结果"

    - id: decision
      name: 评审决策
      execution: serial
      tasks:
        - aggregate_results
        - prioritize_issues
        - make_decision
      dependencies:
        - review
      transitions:
        - condition: "pass"
          to: complete
        - condition: "needs_fix"
          to: fix
        - condition: "fail"
          to: reject

    - id: fix
      name: 问题修复
      execution: serial
      tasks:
        - assign_issues
        - implement_fixes
        - verify_fixes
      dependencies:
        - decision
      transitions:
        - condition: "fixes_verified"
          to: review

    - id: complete
      name: 评审通过
      execution: serial
      tasks:
        - approve_code
        - document_results
        - notify_stakeholders
      dependencies:
        - decision

    - id: reject
      name: 评审不通过
      execution: serial
      tasks:
        - document_issues
        - create_action_plan
        - notify_stakeholders
      dependencies:
        - decision

parallel_execution:
  max_parallelism: 4
  resource_conflict:
    file_exclusive: false
    module_exclusive: false
  quality_integration:
    - rule: "并行评审不同维度"
    - rule: "汇总后统一决策"
    - rule: "问题修复后重新评审"

review_dimensions:
  - id: code_quality
    name: 代码质量
    checks:
      - code_style
      - code_complexity
      - code_duplication
      - code_coverage
  - id: security
    name: 安全审计
    checks:
      - vulnerability_scan
      - dependency_check
      - input_validation
      - authentication_check
  - id: performance
    name: 性能检查
    checks:
      - performance_benchmark
      - memory_usage
      - query_optimization
  - id: best_practice
    name: 最佳实践
    checks:
      - design_patterns
      - error_handling
      - logging_practice
      - documentation

deliverables:
  - type: review
    path: deliverables/reviews/
    format: "code-review-[项目名]-[日期].md"
  - type: report
    path: deliverables/reports/
    format: "review-summary-[项目名]-[日期].md"

logging:
  execution_log: logs/executions/
  decision_log: logs/decisions/
  quality_log: logs/quality/
